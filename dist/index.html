<!DOCTYPE html>
<html>
<head>
    <title>計算機</title>
    <style>
        body {
            background: linear-gradient(135deg, #4A90E2 0%, #357ABD 50%, #1E5BA8 100%);
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .calculator-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            border: 4px solid #333;
        }

        input[type="button"] {
            width: 100px;
            height: 100px;
            font-size: 32px;
            font-weight: bold;
            margin: 8px;
            border: 6px solid #1a1a1a;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.08s ease;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #d4d4d4 0%, #a8a8a8 50%, #8a8a8a 100%);
            box-shadow: 
                0 12px 24px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.6),
                inset 0 -2px 4px rgba(0, 0, 0, 0.3),
                inset 0 2px 4px rgba(255, 255, 255, 0.4);
            color: #1a1a1a;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.5);
            letter-spacing: 1px;
        }

        input[type="button"]:hover {
            background: linear-gradient(180deg, #e0e0e0 0%, #b8b8b8 50%, #9a9a9a 100%);
            box-shadow: 
                0 14px 28px rgba(0, 0, 0, 0.45),
                inset 0 1px 0 rgba(255, 255, 255, 0.7),
                inset 0 -2px 4px rgba(0, 0, 0, 0.35),
                inset 0 2px 4px rgba(255, 255, 255, 0.5);
        }

        input[type="button"]:active {
            background: linear-gradient(180deg, #7a7a7a 0%, #5a5a5a 50%, #3a3a3a 100%);
            box-shadow: 
                inset 0 8px 16px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.2),
                inset 0 -2px 4px rgba(0, 0, 0, 0.5);
            transform: translateY(4px);
        }

        input[type="text"] {
            width: 420px;
            height: 80px;
            font-size: 36px;
            padding: 10px;
            margin-bottom: 20px;
            border: 4px solid #333;
            border-radius: 8px;
            text-align: right;
            font-family: Arial, sans-serif;
            box-shadow: inset 0 3px 10px rgba(0, 0, 0, 0.1);
            background-color: #fff;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #666;
            box-shadow: inset 0 3px 10px rgba(0, 0, 0, 0.1), 0 0 10px rgba(100, 100, 100, 0.3);
        }

        hr {
            display: none;
        }

        h1 {
            display: none;
        }

        .button-row {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="calculator-container">
        <input type="text" id="display" readonly>
        <br>
        <div class="button-row">
            <input type="button" value="1" onclick="appendToDisplay('1')">
            <input type="button" value="2" onclick="appendToDisplay('2')">
            <input type="button" value="3" onclick="appendToDisplay('3')">
            <input type="button" value="+" onclick="appendToDisplay('+')">
        </div>
        <div class="button-row">
            <input type="button" value="4" onclick="appendToDisplay('4')">
            <input type="button" value="5" onclick="appendToDisplay('5')">
            <input type="button" value="6" onclick="appendToDisplay('6')">
            <input type="button" value="-" onclick="appendToDisplay('-')">
        </div>
        <div class="button-row">
            <input type="button" value="7" onclick="appendToDisplay('7')">
            <input type="button" value="8" onclick="appendToDisplay('8')">
            <input type="button" value="9" onclick="appendToDisplay('9')">
            <input type="button" value="*" onclick="appendToDisplay('*')">
        </div>
        <div class="button-row">
            <input type="button" value="0" onclick="appendToDisplay('0')">
            <input type="button" value="C" onclick="clearDisplay()">
            <input type="button" value="=" onclick="calculate()">
            <input type="button" value="/" onclick="appendToDisplay('/')">
        </div>
    </div>
    <script>
        function appendToDisplay(value) {
            document.getElementById("display").value += value;
        }

        function clearDisplay() {
            document.getElementById("display").value = '';
        }

        function calculate() {
            var expression = document.getElementById("display").value;
            try {
                document.getElementById("display").value = eval(expression);
            } catch (e) {
                document.getElementById("display").value = 'Error';
            }
        }
    </script>
</body>
</html>
